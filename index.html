<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="images/OB.png" type="image/png">
  <title>Oliver Brady - Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="timeline_ss.css">
</head>

<body>

  <div class="container">

    <header class="site-header">
      <img src="images/Portrait.JPG" alt="My Portrait" class="profile-portrait">
      <a href="index.html" class="header-link">
        <div class="name-group">
          <h1>Oliver Brady</h1>
          <p>Learning More • Going Further</p>
        </div>
      </a>
    </header>

    <main class="content">
      <div class="card" id="timeline-title-card">
        <h2 class="timeline-main-title">Timeline</h2>
      </div>

      <div class="card" id="filter-card">
        <h3 class="filter-title">Filter:</h3>
        <div id="filter-container"></div>
      </div>

      <div class="timeline-track-wrapper">
        <button class="scroll-btn left-btn" id="scrollLeftBtn" aria-label="Scroll Left">❮</button>

        <div id="timeline-container">
        </div>

        <button class="scroll-btn right-btn" id="scrollRightBtn" aria-label="Scroll Right">❯</button>
      </div>

    </main>
  </div>

  <script>
    let allEvents = [];
    const timelineContainer = document.getElementById('timeline-container');
    const filterContainer = document.getElementById('filter-container');
    const csvFilePath = 'achievements.csv';
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    document.addEventListener('DOMContentLoaded', () => {
      fetch(csvFilePath)
        .then(response => {
          if (!response.ok) throw new Error('Network response was not ok');
          return response.text();
        })
        .then(csvText => {
          allEvents = parseCSV(csvText);

          allEvents.sort((a, b) => {
            const dateA = new Date(a.year, a.month - 1);
            const dateB = new Date(b.year, b.month - 1);
            return dateB - dateA;
          });

          const uniqueCategories = [...new Set(allEvents.flatMap(event => event.category))];
          createCategoryFilters(uniqueCategories.sort());

          filterAndDisplayEvents();
        })
        .catch(error => {
          console.error('Error fetching or parsing CSV:', error);
          timelineContainer.innerHTML = `<p style="color: red; text-align: center;">Error loading timeline data.</p>`;
        });

      // --- Horizontal Scrolling Logic for Desktop Arrows ---
      const scrollLeftBtn = document.getElementById('scrollLeftBtn');
      const scrollRightBtn = document.getElementById('scrollRightBtn');

      scrollLeftBtn.addEventListener('click', () => {
        timelineContainer.scrollBy({ left: -350, behavior: 'smooth' });
      });

      scrollRightBtn.addEventListener('click', () => {
        timelineContainer.scrollBy({ left: 350, behavior: 'smooth' });
      });
    });

    function createCategoryFilters(categories) {
      let filterHTML = categories.map(category => `
        <label class="filter-label">
          <input type="checkbox" name="category" value="${category}" class="filter-checkbox">
          ${category}
        </label>
      `).join('');
      filterContainer.innerHTML = filterHTML;
      document.querySelectorAll('.filter-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', filterAndDisplayEvents);
      });
    }

    function filterAndDisplayEvents() {
      const selectedCategories = [...document.querySelectorAll('.filter-checkbox:checked')].map(cb => cb.value);
      let filteredEvents = selectedCategories.length === 0 ? allEvents : allEvents.filter(event =>
        event.category.some(cat => selectedCategories.includes(cat))
      );
      generateTimeline(filteredEvents);
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
      const headers = lines[0].split(csvRegex).map(header => header.trim().replace(/^"|"$/g, ''));
      const events = [];
      const colIndices = { month: headers.indexOf('month'), year: headers.indexOf('year'), event: headers.indexOf('event'), category: headers.indexOf('category'), description: headers.indexOf('description'), link: headers.indexOf('link') };

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i];
        if (line.trim() === '') continue;
        const values = line.split(csvRegex);
        const clean = (val) => val ? val.trim().replace(/^"|"$/g, '').replace(/""/g, '"') : '';
        events.push({
          month: parseInt(clean(values[colIndices.month]), 10),
          year: parseInt(clean(values[colIndices.year]), 10),
          event: clean(values[colIndices.event]),
          category: clean(values[colIndices.category]).split('|').map(cat => cat.trim()),
          description: clean(values[colIndices.description]),
          link: clean(values[colIndices.link]),
        });
      }
      return events;
    }

    function generateTimeline(events) {
      if (events.length === 0) {
        timelineContainer.innerHTML = '<p style="text-align: center; width: 100%;">No achievements found.</p>';
        return;
      }

      let timelineHTML = '';
      events.forEach(event => {
        const dateStr = `${monthNames[event.month - 1]} ${event.year}`;
        const categoryTagsHTML = event.category.map(cat => `<div class="timeline-category">${cat}</div>`).join('');
        let eventTitleHTML = event.link
          ? `<a href="${event.link}" target="_blank" rel="noopener noreferrer" class="timeline-link">${event.event}</a>`
          : event.event;

        timelineHTML += `
          <div class="timeline-card">
            <div class="timeline-date">${dateStr}</div>
            <h3 class="timeline-event-title">${eventTitleHTML}</h3>
            <div class="timeline-category-wrapper">${categoryTagsHTML}</div>
            <div class="timeline-description">${event.description}</div>
          </div>
        `;
      });

      timelineContainer.innerHTML = timelineHTML;
    }
  </script>
</body>

</html>
