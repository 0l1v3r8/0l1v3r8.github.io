<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="images/OB.png" type="image/png">
  <title>Oliver Brady</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <header class="site-header">
      <img src="images/Portrait.JPG" alt="My Portrait" class="profile-portrait">
      <div class="name-group">
        <h1>Oliver Brady</h1>
        <p>Learning More • Going Further</p>
      </div>
    </header>

    <nav class="navbar">
      <div class="social-icons">
        <a href="https://www.linkedin.com/in/oliver-brady-60729a12a/" target="_blank" rel="noopener noreferrer">
          <img src="images/linkedin_logo.png" alt="Connect on LinkedIn">
        </a>
        <a href="https://www.instagram.com/_oliverbrady_/" target="_blank" rel="noopener noreferrer">
          <img src="images/instagram_logo.png" alt="Follow on Instagram">
        </a>
        <a href="#" onclick="copyEmail(event, 'contact@oliverbrady.uk')" title="Click to copy email address">
          <img src="images/email.png" alt="Email me">
        </a>
      </div>
    </nav>

    <script>
      function copyEmail(event, email) {
        event.preventDefault();
        navigator.clipboard.writeText(email).then(() => {
          alert("Email copied to clipboard:\n" + email);
        }).catch(err => {
          console.error('Failed to copy email: ', err);
          alert("Oops, something went wrong.");
        });
      }
    </script>

    <main class="content">
      <div class="card-grid">
        <a href="profile.html" class="card-link">
          <section class="card" id="profile">
            <h2>Profile</h2>
          </section>
        </a>

        <a href="portfolio.html" class="card-link">
          <section class="card" id="portfolio">
            <h2>Portfolio</h2>
          </section>
        </a>

        <a href="timeline.html" class="card-link">
          <section class="card" id="timeline">
            <h2>Timeline</h2>
          </section>
        </a>
      </div>
    </main>

  </div>
</body>

</html>
