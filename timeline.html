<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="images/OB.png" type="image/png">
  <title>Oliver Brady - Timeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="timeline_ss.css">
</head>

<body>
  <div class="container">
    <header class="site-header">
      <a href="index.html" class="header-link">
        <img src="images/Portrait.JPG" alt="My Portrait" class="profile-portrait">
        <div class="name-group">
          <h1>Oliver Brady</h1>
          <p>Learning More • Going Further</p>
        </div>
      </a>
    </header>

    <main class="content">
      <div class="filter-wrapper" id="filter-container"></div>

      <div class="track-wrapper">
        <button class="scroll-btn blue-variant left-btn" id="scrollLeftBtn">❮</button>

        <div class="track-container" id="timeline-container">
          <p style="text-align: center; width: 100%; color: var(--dark-blue);">Loading...</p>
        </div>

        <button class="scroll-btn blue-variant right-btn" id="scrollRightBtn">❯</button>
      </div>
    </main>
  </div>

  <script>
    let allEvents = [];
    const timelineContainer = document.getElementById('timeline-container');
    const filterContainer = document.getElementById('filter-container');
    const scrollLeftBtn = document.getElementById('scrollLeftBtn');
    const scrollRightBtn = document.getElementById('scrollRightBtn');

    timelineContainer.addEventListener('wheel', (e) => { e.preventDefault(); timelineContainer.scrollLeft += e.deltaY; });
    scrollLeftBtn.addEventListener('click', () => timelineContainer.scrollBy({ left: -350, behavior: 'smooth' }));
    scrollRightBtn.addEventListener('click', () => timelineContainer.scrollBy({ left: 350, behavior: 'smooth' }));
    timelineContainer.addEventListener('scroll', updateArrowVisibility);

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    document.addEventListener('DOMContentLoaded', () => {
      fetch('achievements.csv').then(r => r.text()).then(csvText => {
        allEvents = parseCSV(csvText).sort((a, b) => new Date(a.year, a.month - 1) - new Date(b.year, b.month - 1));
        createCategoryFilters([...new Set(allEvents.flatMap(e => e.category))].sort());
        filterAndDisplayEvents();
      });
    });

    function updateArrowVisibility() {
      scrollLeftBtn.style.opacity = timelineContainer.scrollLeft <= 0 ? '0.3' : '1';
      scrollRightBtn.style.opacity = timelineContainer.scrollLeft + timelineContainer.clientWidth >= timelineContainer.scrollWidth - 1 ? '0.3' : '1';
    }

    function createCategoryFilters(categories) {
      filterContainer.innerHTML = categories.map(category => `
        <label class="filter-label" style="border-color: var(--dark-blue); color: var(--dark-blue);">
          <input type="checkbox" name="category" value="${category}" class="filter-checkbox">
          ${category}
        </label>
      `).join('');
      document.querySelectorAll('.filter-checkbox').forEach(cb => {
        cb.addEventListener('change', function () {
          this.parentElement.style.backgroundColor = this.checked ? 'var(--dark-blue)' : 'var(--bg)';
          this.parentElement.style.color = this.checked ? 'var(--bg)' : 'var(--dark-blue)';
          filterAndDisplayEvents();
        });
      });
    }

    function filterAndDisplayEvents() {
      const selectedCategories = [...document.querySelectorAll('.filter-checkbox:checked')].map(cb => cb.value);
      const events = selectedCategories.length === 0 ? allEvents : allEvents.filter(e => e.category.some(cat => selectedCategories.includes(cat)));

      if (events.length === 0) { timelineContainer.innerHTML = '<p style="text-align: center; width: 100%;">No achievements found.</p>'; return; }

      timelineContainer.innerHTML = events.map(event => `
        <div class="timeline-item track-item">
          <div class="timeline-marker"></div>
          <div class="timeline-card track-item-scrollable">
            <div style="font-weight: 900; font-size: 0.85rem; color: var(--dark-green); margin-bottom: 0.5rem; text-transform: uppercase;">${monthNames[event.month - 1]} ${event.year}</div>
            <h3 style="font-size: clamp(1.1rem, 2vw, 1.3rem); margin: 0 0 0.5rem 0; color: var(--dark-blue);">${event.link ? `<a href="${event.link}" target="_blank" style="color: inherit; text-decoration: none;">${event.event}</a>` : event.event}</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem;">
              ${event.category.map(cat => `<span style="font-size: 0.7rem; font-weight: 900; text-transform: uppercase; color: var(--dark-red); background: var(--bg); border: 1px solid var(--light-red); padding: 0.2rem 0.6rem; border-radius: 15px;">${cat}</span>`).join('')}
            </div>
            <p style="font-size: 0.95rem; margin: 0; color: #444;">${event.description}</p>
          </div>
        </div>`).join('');

      setTimeout(() => { timelineContainer.scrollLeft = timelineContainer.scrollWidth; updateArrowVisibility(); }, 50);
    }

    function parseCSV(text) {
      const lines = text.trim().split('\n');
      if (lines.length < 2) return [];
      const csvRegex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
      const headers = lines[0].split(csvRegex).map(h => h.trim().replace(/^"|"$/g, ''));
      const ev = [], col = { month: headers.indexOf('month'), year: headers.indexOf('year'), event: headers.indexOf('event'), category: headers.indexOf('category'), description: headers.indexOf('description'), link: headers.indexOf('link') };

      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const vals = lines[i].split(csvRegex).map(v => v ? v.trim().replace(/^"|"$/g, '').replace(/""/g, '"') : '');
        ev.push({ month: parseInt(vals[col.month], 10), year: parseInt(vals[col.year], 10), event: vals[col.event], category: vals[col.category].split('|').map(c => c.trim()), description: vals[col.description], link: vals[col.link] });
      }
      return ev;
    }
  </script>
</body>

</html>
