<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="icon" href="images/OB.png" type="image/png">
  <title>Oliver Brady - Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="portfolio_style.css">
</head>

<body>
  <div class="container">

    <header class="site-header">
      <img src="images/Portrait.JPG" alt="My Portrait" class="profile-portrait">
      <a href="index.html" class="header-link">
        <div class="name-group">
          <h1>Oliver Brady</h1>
          <p>Learning More • Going Further</p>
        </div>
      </a>
    </header>

    <main class="content">
      <div class="card title-card" style="margin-bottom: 1rem; padding: 1rem; border-bottom: none;">
        <h2 class="main-title" style="margin: 0; font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 900;">Portfolio
        </h2>
      </div>

      <div class="card" id="filter-card">
        <h3 class="filter-title">Filter:</h3>
        <div id="filter-container"></div>
      </div>

      <!-- NEW: The Horizontal Track Wrapper with Navigation Arrows -->
      <div class="portfolio-track-wrapper">
        <button class="scroll-btn left-btn" id="scrollLeftBtn" aria-label="Scroll Left">❮</button>

        <div id="portfolio-container">
          <!-- JS will inject horizontal cards here -->
        </div>

        <button class="scroll-btn right-btn" id="scrollRightBtn" aria-label="Scroll Right">❯</button>
      </div>

    </main>
  </div>

  <script>
    const jsonPath = 'portfolio.json';
    const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    let portfolioData = [];
    const portfolioContainer = document.getElementById('portfolio-container');
    const filterContainer = document.getElementById('filter-container');

    document.addEventListener('DOMContentLoaded', () => {

      fetch(jsonPath)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return response.json();
        })
        .then(data => {
          portfolioData = data;

          portfolioData.sort((a, b) => {
            if (b.year !== a.year) return b.year - a.year;
            return b.month - a.month;
          });

          const uniqueCategories = [...new Set(portfolioData.flatMap(item => item.category))].sort();
          createCategoryFilters(uniqueCategories);

          filterAndDisplayItems();
        })
        .catch(error => {
          console.error('Error loading portfolio data:', error);
          portfolioContainer.innerHTML = `<p style="text-align: center; color: var(--dark-red); padding: 2rem; width: 100%;">Unable to load portfolio data.</p>`;
        });

      // --- Horizontal Scrolling Logic for Desktop Arrows ---
      const scrollLeftBtn = document.getElementById('scrollLeftBtn');
      const scrollRightBtn = document.getElementById('scrollRightBtn');

      scrollLeftBtn.addEventListener('click', () => {
        portfolioContainer.scrollBy({ left: -350, behavior: 'smooth' });
      });

      scrollRightBtn.addEventListener('click', () => {
        portfolioContainer.scrollBy({ left: 350, behavior: 'smooth' });
      });
    });

    function createCategoryFilters(categories) {
      let filterHTML = categories.map(category => `
        <label class="filter-label">
          <input type="checkbox" name="category" value="${category}" class="filter-checkbox">
          ${category}
        </label>
      `).join('');
      filterContainer.innerHTML = filterHTML;

      document.querySelectorAll('.filter-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', filterAndDisplayItems);
      });
    }

    function filterAndDisplayItems() {
      const selectedCategories = [...document.querySelectorAll('.filter-checkbox:checked')].map(cb => cb.value);
      let filteredItems;

      if (selectedCategories.length === 0) {
        filteredItems = portfolioData;
      } else {
        filteredItems = portfolioData.filter(item =>
          item.category.some(cat => selectedCategories.includes(cat))
        );
      }
      generatePortfolio(filteredItems);
    }

    function generatePortfolio(items) {
      if (items.length === 0) {
        portfolioContainer.innerHTML = '<p style="text-align: center; padding: 2rem; width: 100%;">No items match the selected filters.</p>';
        return;
      }

      let html = '';

      items.forEach(item => {
        const dateString = `${monthNames[item.month - 1]} ${item.year}`;
        const tagsHTML = item.category.map(cat => `<span class="tag tag-${cat.toLowerCase()}">${cat}</span>`).join('');

        let mediaHTML = '';
        if (item.type === 'image') {
          mediaHTML = `<img src="${item.source}" alt="${item.title}" class="media-content">`;
        } else if (item.type === 'video') {
          mediaHTML = `
            <video controls class="media-content">
              <source src="${item.source}" type="video/mp4">
              Your browser does not support video.
            </video>`;
        } else if (item.type === 'youtube') {
          mediaHTML = `
            <div class="video-responsive">
              <iframe src="${item.source}" frameborder="0" allowfullscreen></iframe>
            </div>`;
        } else if (item.type === 'pdf') {
          mediaHTML = `
            <div class="pdf-wrapper">
              <span>PDF Document</span>
              <a href="${item.source}" target="_blank" class="pdf-btn">Download / Read</a>
            </div>`;
        }

        html += `
          <div class="portfolio-item">
            <div class="portfolio-media">
              ${mediaHTML}
            </div>
            <div class="portfolio-details">                             
              <div class="meta-row">
                <div class="tags-group">${tagsHTML}</div>
                <span class="date-text">${dateString}</span>
              </div>
              <h3>${item.title}</h3>
              <p>${item.description}</p>
            </div>
          </div>
        `;
      });
      portfolioContainer.innerHTML = html;
    }
  </script>
</body>

</html>
